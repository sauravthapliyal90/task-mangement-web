version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - '5000:5000'
    env_file: ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/task_management_db
      - CLIENT_ORIGIN=http://localhost:8080
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - '8080:80'
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
